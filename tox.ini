[tox]
envlist =
    py{310,311}-dj{32,42,52}
    py{312}-dj{42,52,60,main}
    py{313}-dj{42,52,60,main}
    py{314}-dj{42,52,60,main}

[testenv]
usedevelop = true
extras = all,tests
commands =
    python -Wd {envbindir}/coverage run tests/manage.py test -v2 --keepdb {posargs:testapp}
    coverage report -m
deps =
    dj32: Django>=3.2,<4.0
    dj42: Django>=4.2,<5.0
    dj52: Django>=5.2,<6.0
    dj60: Django>=6.0,<6.1
    djmain: https://github.com/django/django/archive/main.tar.gz
